version: '3.8'
services:
  app:
    build: ./WeatherAPI/
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      OPENWEATHERMAP_API_KEY: ${OPENWEATHERMAP_API_KEY}
    depends_on:
      - redis
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
volumes:
  redis-data:

